<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Feliz Aniversário ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg,#1e1e2f,#2b1f3f,#3a1c4f);
  color:#fff;
  overflow:hidden;
}

.page{
  position:absolute;
  width:100%;
  height:100vh;
  padding:60px 30px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  opacity:0;
  transition:opacity 0.8s ease;
  pointer-events:none;
}

.page.active{
  opacity:1;
  pointer-events:auto;
}

h1,h2{
  font-family:'Playfair Display', serif;
  font-size:32px;
  line-height:1.4;
}

.text{
  font-size:20px;
  line-height:1.7;
  max-width:800px;
}

.button-area{
  margin-top:20px;
}

button{
  padding:16px 30px;
  font-size:18px;
  border:none;
  border-radius:15px;
  background:linear-gradient(135deg,#ff4d88,#ff7eb3);
  color:white;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(255,77,136,0.4);
  transition:0.3s;
}

button:hover{
  transform:scale(1.07);
}

.hidden{
  display:none;
  margin-top:20px;
  font-size:22px;
}

.typing{
  font-size:20px;
  line-height:1.8;
  max-width:900px;
}

.cake{
  font-size:130px;
  text-align:center;
}

.confetti{
  position:absolute;
  font-size:40px;
  animation:explode 3s ease forwards;
}

@keyframes explode{
  0%{transform:translateY(0) scale(0.5); opacity:1;}
  100%{transform:translateY(-400px) scale(1.2); opacity:0;}
}
</style>
</head>
<body>

<!-- Página 1 -->
<div class="page active" id="p1">
  <div>
    <h1>sabe que dia é hoje?</h1>
    <div class="button-area">
      <button onclick="revelar()">revelar</button>
    </div>
    <div id="msg1" class="hidden">é o seu dia minha vidaaaaa 🥰</div>
  </div>
  <div>
    <button onclick="nextPage(2)">continuar</button>
  </div>
</div>

<!-- Página 2 -->
<div class="page" id="p2">
  <div class="typing" id="text2"></div>
  <div>
    <button onclick="nextPage(3)">continuar</button>
  </div>
</div>

<!-- Página 3 -->
<div class="page" id="p3">
  <div class="typing" id="text3"></div>
  <div>
    <button onclick="nextPage(4)">continuar</button>
  </div>
</div>

<!-- Página 4 -->
<div class="page" id="p4">
  <div style="text-align:center;">
    <div class="cake">🎂</div>
    <button onclick="assoprar()">assopra velas</button>
  </div>
  <div>
    <button onclick="nextPage(5)">continuar</button>
  </div>
</div>

<!-- Página 5 -->
<div class="page" id="p5">
  <div>
    <h2>não é um presente caro, mas foi feito com muito amor e carinho 💖</h2>
    <h1>FELIZ ANIVERSÁRIO MINHA VIDA 🎉</h1>
  </div>
  <div>
    <button onclick="window.location.href='https://youtu.be/LAKWX2ceSzY?si=QuBgfSKLLy_sKwVT'">
      aperte aqui
    </button>
  </div>
</div>

<script>
function nextPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('p'+n).classList.add('active');
}

function revelar(){
  document.getElementById('msg1').style.display='block';
}

function typeEffect(element,text,speed){
  let i=0;
  element.innerHTML="";
  function typing(){
    if(i<text.length){
      element.innerHTML+=text.charAt(i);
      i++;
      setTimeout(typing,speed);
    }
  }
  typing();
}

const texto2="Hoje é o dia da garota mais linda desse mundo 🥺 Você é luz, você é paz, você é aquele sorriso que muda completamente o meu dia. Eu admiro sua força, seu coração gigante e o jeito que você cuida de todo mundo. Você merece o mundo inteiro, e mesmo assim eu ainda acho pouco para você. Eu te amo mais do que qualquer palavra consegue explicar ❤️";

const texto3="Eu amo você de um jeito que cresce todos os dias. Amo sua voz, seu jeito, seu carinho, sua presença. Você é a parte mais bonita da minha vida. Obrigado por existir, obrigado por ser você. Eu prometo continuar te amando cada dia mais 💞";

typeEffect(document.getElementById("text2"),texto2,30);
typeEffect(document.getElementById("text3"),texto3,30);

function assoprar(){
  const emojis=["🎊","🎈","🎉"];
  for(let i=0;i<50;i++){
    let span=document.createElement("span");
    span.classList.add("confetti");
    span.innerText=emojis[Math.floor(Math.random()*emojis.length)];
    span.style.left=Math.random()*100+"vw";
    span.style.top=Math.random()*100+"vh";
    document.body.appendChild(span);
    setTimeout(()=>span.remove(),3000);
  }
}
</script>

</body>
</html>
